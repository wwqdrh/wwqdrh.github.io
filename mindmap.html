<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习路线图</title>
  <style>
    .link line {
      stroke: #696969;
    }

    .link line.separator {
      stroke: #fff;
      stroke-width: 2px;
    }

    .node circle {
      stroke: #000;
      stroke-width: 1.5px;
    }

    .node text {
      font: 10px sans-serif;
      pointer-events: none;
    }

    svg {
      border: 1px solid #000;
    }
  </style>
</head>

<body>

</body>
<script src="//d3js.org/d3.v3.min.js"></script>
<script>
  var graph = {
    "nodes": [
      { "atom": "Golang", "size": 22 },
      { "atom": "Python", "size": 22 },
      { "atom": "Mysql", "size": 22 },
      { "atom": "Redis", "size": 24 },
      { "atom": "MongoDB", "size": 21 },
      { "atom": "RabbitMQ", "size": 26 },
      { "atom": "Docker", "size": 26 },
      { "atom": "操作系统", "size": 21 },
      { "atom": "计算机网络", "size": 21 },
      { "atom": "数据结构与算法", "size": 21 },
      { "atom": "kubernetes", "size": 21 },
      { "atom": "helm", "size": 21 },
      { "atom": "prometheus", "size": 21 }
    ],
    "links": [
      { "source": 0, "target": 1, "bond": 1 },
      { "source": 1, "target": 2, "bond": 1 },
      { "source": 1, "target": 3, "bond": 1 },
      { "source": 2, "target": 5, "bond": 2 },
      { "source": 2, "target": 6, "bond": 1 },
      { "source": 1, "target": 4, "bond": 1 },
      { "source": 3, "target": 10, "bond": 1 },
      { "source": 3, "target": 11, "bond": 1 },
      { "source": 0, "target": 7, "bond": 1 },
      { "source": 0, "target": 8, "bond": 1 },
      { "source": 0, "target": 9, "bond": 1 },
      { "source": 5, "target": 12, "bond": 1 }
    ]
  }
    ;

  var width = window.innerWidth,
    height = window.innerHeight;

  var color = d3.scale.category20();


  var radius = d3.scale.sqrt()
    .range([0, 6]);

  var svg = d3.select("body").append("svg")
    .attr("width", width)
    .attr("height", height);

  var force = d3.layout.force()
    .size([width, height])
    .charge(-400)
    .linkDistance(function (d) { return radius(d.source.size) + radius(d.target.size) + 20; });

  window.onload = function () {

    // force
    // .nodes(graph.nodes);

    force
      .nodes(graph.nodes)
      .links(graph.links)
      .on("tick", tick)
      .start();

    var link = svg.selectAll(".link")
      .data(graph.links)
      .enter().append("g")
      .attr("class", "link");

    link.append("line")
      .style("stroke-width", function (d) { return (d.bond * 2 - 1) * 2 + "px"; });

    link.filter(function (d) { return d.bond > 1; }).append("line")
      .attr("class", "separator");

    var node = svg.selectAll(".node")
      .data(graph.nodes)
      .enter().append("g")
      .attr("class", "node")
      .call(force.drag);

    node.append("circle")
      .attr("r", function (d) { return radius(d.size); })
      .style("fill", function (d) { return color(d.atom); });

    node.append("text")
      .attr("dy", ".35em")
      .attr("text-anchor", "middle")
      .text(function (d) { return d.atom; });

    function tick() {
      link.selectAll("line")
        .attr("x1", function (d) { return d.source.x; })
        .attr("y1", function (d) { return d.source.y; })
        .attr("x2", function (d) { return d.target.x; })
        .attr("y2", function (d) { return d.target.y; });

      node.attr("transform", function (d) { return "translate(" + d.x + "," + d.y + ")"; });
    }
  };
</script>

</html>
