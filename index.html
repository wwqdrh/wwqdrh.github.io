<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wwqdrh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        .center {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        a {
            width: 150px;
            height: 50px;
            /*   background: #ededed; */
            position: relative;
            text-decoration: none;
            font-weight: bold;
            border-radius: 300px;
            overflow: hidden;
        }

        .btn-text {
            color: black;
            position: absolute;
            padding-right: 30px;
            left: 30%;
            top: 50%;
            transform: translate(-30%, -50%);
            transition-duration: 0.3s;
            transition-timing-function: ease-in-out;
        }

        a:hover .btn-text {
            /*   color: white; */
            padding-right: 0px;
        }

        .btn-bg {
            width: 50px;
            height: 50px;
            border-radius: 300px;
            position: absolute;
            top: 50%;
            right: 0;
            transform: translate(0, -50%);
            background-color: #ffcc00;
            transition-duration: 0.3s;
            transition-timing-function: ease-in-out;
        }

        a:hover .btn-bg {
            width: 170px;
            height: 170px;
        }

        i {
            position: absolute;
            color: black;
            transform: translateY(-50%);
            top: 50%;
            right: 17px;
        }

        .bodymovinanim {
            position: absolute;
            transform: translateY(-50%);
            top: 50%;
            right: 0;
            width: 50px;
            height: 50px;
        }

        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body>
    <div class="center">
        <a href="/blog" class="button">
            <div class="btn-bg">
            </div>
            <span class="btn-text">Blog</span>
            <div class="bodymovinanim"></div>
        </a>

        <a href="/apps" class="button">
            <div class="btn-bg">
            </div>
            <span class="btn-text">Apps</span>
            <div class="bodymovinanim"></div>
        </a>

        <a href="/books" class="button">
            <div class="btn-bg">
            </div>
            <span class="btn-text">Books</span>
            <div class="bodymovinanim"></div>
        </a>

        <a href="/mall" class="button">
            <div class="btn-bg">
            </div>
            <span class="btn-text">Mall</span>
            <div class="bodymovinanim"></div>
        </a>
    </div>
    <script src="./index.js"></script>
</body>

</html>
