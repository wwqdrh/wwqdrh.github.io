//dwz.cn/N6gekUDJ"},{"id":2,"meta":"编程系列","tag":"Python","cover":"/mall/assets/images/2/cover.png","spec":["/mall/assets/images/2/spec1.png","/mall/assets/images/2/spec2.png","/mall/assets/images/2/spec3.png","/mall/assets/images/2/spec4.png","/mall/assets/images/2/spec5.png"],"name":"Python Flask高级编程之从0到1开发《鱼书》精品项目","value":"￥9.9","description":"通过一个项目的实践，深入浅出讲解Flask核心原理、剖析Flask源码，在解读Flask的同时，学习Python高级编程、培养面向对象思维，是市面上稀缺的优质课程。          1、承接基础，深入学习Python高级语法，高级装饰器 / 上下文管理器（with） / 高阶函数的应用，迭代器与生成器（yield）的应用，多线程，进程与线程 / 全局解释器GIL / Local与LocalStack / 线程安全与线程隔离          2、Python的面向对象，类的本质与应用 / 类的多继承 / 理解Python的动态特性          3、深入剖析Flask核心机制，再也不怕被人说“只会用框架”，Flask基础，request与response / 消息闪现 / Jinja模板渲染 / 蓝图，Flask核心，Flask上下文环境 / AppContext与RequestContext / Flask核心对象，Flask扩展，ORM数据模型 / Flask项目层级结构 / 实现缓存 / endpoint原理","link":"https://dwz.cn/yMkOFt7K"},{"id":3,"meta":"编程系列","tag":"Python","cover":"/mall/assets/images/3/cover.png","spec":["/mall/assets/images/3/spec1.png","/mall/assets/images/3/spec2.png","/mall/assets/images/3/spec3.png"],"name":"Python Flask高级编程之RESTFul API前后端分离精讲","value":"￥9.9","description":"1、Token令牌：使用JWT令牌机制，可用于小程序App与单页面应用程序          2、自定义红图：Flask只提供应用程序级别与蓝图级别的架构，我们自定义一个红图（Redprint）来扩展Flask结构体系          3、Python Class JSON序列化：Python对Class的序列化不太方便，给出一个灵活的JSON序列化方案，支持新增和隐藏属性          4、全局异常处理：重写Flask HTTPException与WTForms定义统一异常返回5、格式，方便前端开发：接口保护+权限控制，灵活性极强的配置方案，提供函数\u0026模块级别的权限控制机制          6、自定义Scope类：采用继承的方式，为每个角色定义权限分组，实现细粒度可加减的权限控制方案","link":"https://dwz.cn/OZSrnakU"},{"id":4,"meta":"编程系列","tag":"容器云","cover":"/mall/assets/images/4/cover.png","spec":["/mall/assets/images/4/spec1.png","/mall/assets/images/4/spec2.png","/mall/assets/images/4/spec3.png","/mall/assets/images/4/spec4.png","/mall/assets/images/4/spec5.png"],"name":"Docker+Kubernetes(k8s)微服务容器化实践","value":"￥9.9","description":"1、掌握传统服务和微服务都适用的Docker化思路          2、学会Docker私有仓库如何准备          3、重点讲解Kubernetes，同时对比讲解Mesos, Swarm          4、掌握Kubernetes细致的非翻墙原生的安装          5、把Kubernetes剥离出三部分：核心模块，服务发          现模块和认证授权，逐步精讲","link":"https://dwz.cn/lEkWWGIz"},{"id":5,"meta":"编程系列","tag":"Golang","cover":"/mall/assets/images/5/cover.png","spec":["/mall/assets/images/5/spec1.png","/mall/assets/images/5/spec2.png","/mall/assets/images/5/spec3.png","/mall/assets/images/5/spec4.png","/mall/assets/images/5/spec5.png","/mall/assets/images/5/spec6.png","/mall/assets/images/5/spec7.png"],"name":"全流程开发 GO实战电商网站高并发秒杀系统","value":"￥9.9","description":"1、采用分布式权限验证设计，采用Cookie验证的方式代替分布式Seesion， 以GO语言全新的视角，让秒杀系统的开发可以简易实现， 免去繁琐的传统技术栈，采用架构设计降低系统整体复杂度          2、分布式权限验证：Cookie验证、流量拦截、速率控制          3、分布式数量控制：防止超卖、分布式扩容、去Redis实现          4、异步消息队列: 异步下单提高性能、排队入库防止暴库","link":"https://dwz.cn/0RKRMuro"},{"id":6,"meta":"编程系列","tag":"深度学习","cover":"/mall/assets/images/6/cover.png","spec":["/mall/assets/images/6/spec1.png","/mall/assets/images/6/spec2.png","/mall/assets/images/6/spec3.png","/mall/assets/images/6/spec4.png"],"name":"BAT大牛亲授 个性化推荐算法实战","value":"￥9.9","description":"结合多年项目实战经验，让你掌握一套完整的，能落地的个性化推荐算法体系！多种个性化召回算法 —— 从背景知识，物理意义，数学原理，代码实战等方面详细解析。\n多种learn to rank算法 —— 从模型网络结构，数学原理，代码实战，效果调优等多方面详细介绍。","link":"https://dwz.cn/ifNJauxk"},{"id":7,"meta":"编程系列","tag":"深度学习","cover":"/mall/assets/images/7/cover.png","spec":["/mall/assets/images/7/spec1.png","/mall/assets/images/7/spec2.png","/mall/assets/images/7/spec3.png","/mall/assets/images/7/spec4.png","/mall/assets/images/7/spec5.png","/mall/assets/images/7/spec6.png","/mall/assets/images/7/spec7.png"],"name":"Go语言实战流媒体视频网站","value":"9.9","description":"前后端分离的系统架构设计\nRESTful风格API的设计与实现\n系统的服务化解耦\nGo语言实现Webservice\nGo语言的Channel和并发模型的实践应用\n利用Go语言原生Template完成Web UI的实现\n应用上云，理解服务拆分和架构调整要点，依托阿里云，学习cloud native环境下的应用及优势\n充分发挥Go语言特性，开发高性能网站。","link":"https://dwz.cn/6wKiyIvT"},{"id":8,"meta":"编程系列","tag":"计算机网络","cover":"/mall/assets/images/8/cover.png","spec":["/mall/assets/images/8/spec1.png","/mall/assets/images/8/spec2.png","/mall/assets/images/8/spec3.png","/mall/assets/images/8/spec4.png","/mall/assets/images/8/spec5.png","/mall/assets/images/8/spec6.png"],"name":"HTTP协议原理+实践 ，Web开发工程师必学","value":"9.9","description":"很多同学对于HTTP协议基本不了解，或者只了解其中狭小的一部分，导致很多同学无法快速成长，陷入重复coding的地狱。这次课程会从原理到实践，用完整的例子展示HTTP协议的各个环节，让这些同学突破困境，快速成长。\nHTTP协议原理网络分层模型TCP和HTTP的关系HTTP数据包构成头行信息的定义。\nHTTP Header数据传输类型缓存和资源校验Cookie和Session各种非常有意义的Header。\n主流技术解析Nginx使用和代理、缓存配置HTTPS服务的意义和使用HTTP2的定义和实现。","link":"https://dwz.cn/2okLi5zm"},{"id":9,"meta":"编程系列","tag":"Golang","cover":"/mall/assets/images/9/cover.png","spec":["/mall/assets/images/9/spec1.png","/mall/assets/images/9/spec2.png","/mall/assets/images/9/spec3.png","/mall/assets/images/9/spec4.png"],"name":"Go语言开发分布式任务调度 ，轻松搞定高性能Crontab","value":"9.9","description":"Golang因其强大的协程机制，广泛应用于解决分布式环境下的高并发问题。本课程结合Etcd与MongoDB实现一个基于Master-Worker分布式架构的任务调度系统，带你掌握Golang的工程实践能力以及CAP、Raft等知识经验。\nShell任务执行：Command标准库的应用，Shell命令调用。\nCron表达式调用：Cron表达式的原理剖析、第三方开源库解析Cron表达式、多任务并发调度实现\nEtcd协调服务：Raft协议的原理解析、Etcd服务端的搭建、核心API的解析与应用\nMongoDB分布式存储：MongoDB的工作原理、MongoDB服务端搭建、常用API的应用","link":"https://dwz.cn/liaGRjLD"},{"id":10,"meta":"编程系列","tag":"移动开发","cover":"/mall/assets/images/10/cover.png","spec":["/mall/assets/images/10/spec1.png","/mall/assets/images/10/spec2.png","/mall/assets/images/10/spec3.png","/mall/assets/images/10/spec4.png","/mall/assets/images/10/spec5.png","/mall/assets/images/10/spec6.png"],"name":"Flutter从入门到进阶 实战携程网App","value":"9.9","description":"本课程将带你从Dart基础语法开始，领略Flutter之美，轻松全面的掌握Flutter开发核心技术。通过本课程的学习，可以让你的Flutter技术能力和项目经验都得到前所未有的提升！\n\nFlutter必备Dart基础: 数据类型, 构造方法、静态方法,抽象类和方法,mixins,泛型类和泛型方法,Dart编程技巧。\nFlutter快速上手: Flutter的知识体系架构\nFlutter与iOS、Android、RN的异同,不同开发者该如何快速上手Flutter开发,Flutter必备基础入门","link":"https://dwz.cn/YdiCUMCW"},{"id":11,"meta":"编程系列","tag":"Java","cover":"/mall/assets/images/11/cover.png","spec":["/mall/assets/images/11/spec1.png","/mall/assets/images/11/spec2.png","/mall/assets/images/11/spec3.png","/mall/assets/images/10/spec4.png","/mall/assets/images/11/spec5.png"],"name":"Java并发编程高阶技术-高性能并发框架解析与实战","value":"9.9","description":"全网唯一深度解析并发编程框架disrupt
